# Full-movie training (tutorial image exercise). Same net as first_half config.

data_params:
  raider_dir: data/raider
  movie_split_for_training: full
  half_tr: 15
  num_average_samples: 3
  stride_tr: 3

tvae_params:
  shared_channels: 256
  enc_ch: 512
  dec_ch: 512
  input_timesteps: 10
  beta: 0.1
  alpha: 1.0

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 5.0

checkpoint_path: fmri_raiders/checkpoints/raider_temporal_vae_full_movie.pt
