# Pieman2 — first-half training (half 2 held out for TSM-style eval).
#
#   python fmri_pieman/train_temporal_vae.py --config fmri_pieman/configs/pieman_temporal_vae.yml
#
# Pieman gray-matter ~98k voxels × 18 subjects: Conv1d uses voxels as channels, so enc_ch/dec_ch
# must stay small (unlike Raider ~1k VT voxels). If CUDA OOM, lower batch_size to 1 or use
#   python fmri_pieman/train_temporal_vae.py ... --device cpu

data_params:
  pieman_dir: data/pieman
  movie_split_for_training: first_half
  half_tr: 15
  num_average_samples: 3
  stride_tr: 3

tvae_params:
  shared_channels: 64
  enc_ch: 24
  dec_ch: 24
  input_timesteps: 10
  beta: 0.1
  alpha: 1.0

training_params:
  batch_size: 1
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 5.0

checkpoint_path: fmri_pieman/checkpoints/pieman_temporal_vae.pt
