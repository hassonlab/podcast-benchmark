# SRM training configuration
# Run with: python shared_space/scripts/train_srm.py --config shared_space/configs/podcast_srm.yml

# --- Data (same as podcast_vae.yml) ---
data_params:
  data_root: data
  electrode_file_path: processed_data/all_subject_sig.csv
  use_high_gamma: true
  window_width: 0.625

# --- SRM architecture ---
srm_params:
  features: 8          # shared subspace dimensionality (capped at min electrodes across subjects = 8)
  n_iter: 10           # SRM fitting iterations

# --- Training (timepoint sampling only) ---
training_params:
  vae_stride_ms: 50    # step size (ms) between sampled timepoints (same as VAE)

# --- Output ---
checkpoint_path: shared_space/checkpoints/srm_podcast.pkl
