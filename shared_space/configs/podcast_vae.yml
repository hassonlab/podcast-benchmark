# VAE training configuration
# Run with: python shared_space/scripts/train_vae.py --config shared_space/configs/podcast_vae.yml

# --- Data ---
data_params:
  data_root: data
  electrode_file_path: processed_data/all_subject_sig.csv
  use_high_gamma: true
  window_width: 0.625          # seconds — 625 ms window
  num_average_samples: 32      # bins: floor(0.625 * 512) // 32 = 10 bins

# --- VAE architecture ---
vae_params:
  latent_dim: 128
  beta: 0.1                    # reduced from 1.0 — avoids posterior collapse (KL was too small)
  encoder_channels: [64, 32]   # [first_conv_out, second_conv_out]
  decoder_channels: [32, 64]   # [first_deconv_out, second_deconv_out]
  input_timesteps: 10          # = floor(window_width * 512) // num_average_samples

# --- Training ---
training_params:
  vae_stride_ms: 50            # step size (ms) between sampled timepoints
  batch_size: 64
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001

# --- Output ---
checkpoint_path: shared_space/checkpoints/vae_podcast.pt
