model_constructor_name: ensemble_pitom_model
config_setter_name: neural_conv
task_name: volume_level_decoding_task
model_params:
  conv_filters: 128
  dropout: 0.2
  num_models: 1
  embedding_dim: 1  # Regression output
  output_activation: linear

training_params:
  batch_size: 32
  epochs: 150
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 100
  n_folds: 10
  min_lag: -1000
  max_lag: 1000
  lag_step_size: 200
  losses: [mse]
  metrics: [r2, corr]
  early_stopping_metric: r2
  smaller_is_better: false

data_params:
  data_root: data
  subject_ids: [1]  # Subject 1 only
  window_width: 0.625
  preprocessing_fn_name: window_average_neural_data
  electrode_file_path: processed_data/all_subject_sig.csv
  preprocessor_params:
    num_average_samples: 32
  task_params:
    audio_path: stimuli/podcast.wav
    target_sr: 512
    cutoff_hz: 8.0
    butter_order: 4
    zero_phase: true
    allow_resample_audio: true
    window_size: 200.0
    hop_size: 25.0

trial_name: neural_conv_decoder_volume_level_sub1





