# Example: Finetuning Foundation Model for Sentence Onset Task
# Subject 1 only
# Binary Classification

model_constructor_name: example_foundation_finetune
config_setter_name: example_foundation_finetune
task_name: sentence_onset_task

model_params:
  model_dir: models/example_foundation_model/pretrained_model
  mlp_layer_sizes: [128]
  output_dim: 1  # Binary classification
  dropout: 0.1
  freeze_foundation: false
  num_frozen_layers: 2

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: -200
  max_lag: 300
  lag_step_size: 100
  losses: [bce]
  loss_weights: [1.0]
  metrics: [roc_auc, sensitivity, specificity, f1, precision]
  early_stopping_metric: f1
  smaller_is_better: false

data_params:
  data_root: data
  subject_ids: [1]  # Subject 1 only
  task_params:
    negatives_per_positive: 5
    negative_margin_s: 0.75
    sentence_csv_path: processed_data/all_sentences_podcast.csv

trial_name: example_foundation_finetune_sentence_onset_sub1

