# Example: Finetuning Foundation Model for Content/Non-content Task
# Subject 1 only
# Binary Classification

model_constructor_name: example_foundation_finetune
config_setter_name: example_foundation_finetune
task_name: content_noncontent_task

model_params:
  model_dir: models/example_foundation_model_fixed/pretrained_model
  mlp_layer_sizes: [128]
  output_dim: 1  # Binary classification
  dropout: 0.1
  freeze_foundation: false
  num_frozen_layers: 2

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: 0
  max_lag: 400
  lag_step_size: 100
  losses: [bce]
  loss_weights: [1.0]
  metrics: [roc_auc, f1, confusion_matrix]
  early_stopping_metric: roc_auc
  smaller_is_better: false
  logistic_regression_baseline: true

data_params:
  data_root: data
  subject_ids: [1]  # Subject 1 only
  task_params:
    content_noncontent_path: processed_data/df_word_onset_with_pos_class.csv

trial_name: example_foundation_finetune_content_noncontent_sub1

