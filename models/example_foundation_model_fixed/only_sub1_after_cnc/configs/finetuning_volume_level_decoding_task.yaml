# Example: Finetuning Foundation Model for Volume Level Decoding Task
# Subject 1 only
# Regression

model_constructor_name: example_foundation_finetune
config_setter_name: example_foundation_finetune
task_name: volume_level_decoding_task

model_params:
  model_dir: models/example_foundation_model_fixed/pretrained_model
  mlp_layer_sizes: [128]
  output_dim: 1  # Regression
  dropout: 0.1
  freeze_foundation: false
  num_frozen_layers: 2

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: -1000
  max_lag: 1001
  lag_step_size: 50
  losses: [mse]
  loss_weights: [1.0]
  metrics: [r2, corr]
  early_stopping_metric: r2
  smaller_is_better: false

data_params:
  data_root: data
  subject_ids: [1]  # Subject 1 only
  task_params:
    audio_path: stimuli/podcast.wav
    target_sr: 512
    cutoff_hz: 8.0
    butter_order: 4
    zero_phase: true
    allow_resample_audio: true
    window_size: 200.0
    hop_size: 25.0

trial_name: example_foundation_finetune_volume_level_sub1

