# Training Matrix Configuration
# Maps model types to tasks to config files
# Format: {model_name: {task_name: [config_files]}}

controls/llm_decoding:
  llm_decoding_task:
    - no_brain_data.yml
baselines/neural_conv_decoder:
  word_embedding_decoding_task:
    - gpt2.yml
    - glove.yml
    - arbitrary.yml
  sentence_onset_task:
    - sentence_onset.yml
  gpt_surprise_task:
    - gpt_surprise.yml
  gpt_surprise_multiclass_task:
    - gpt_surprise_multiclass.yml
  content_noncontent_task:
    - content_noncontent.yml
  pos_task:
    - pos.yml
  llm_decoding_task:
    - llm_two_stage_multi.yml
baselines/time_pooling_model:
  volume_level_decoding_task:
    - simple_model.yml
    - torch_ridge.yml

