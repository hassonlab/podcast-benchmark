config_setter_name: diver_finetune
model_spec:
  constructor_name: diver_finetune
  params:
    d_model: 256
    deepspeed_pth_format: true
    e_layer: 12
    foundation_dir: models/diver/pretrained_model/256_mp_rank_00_model_states.pt
    freeze_foundation: true
    ft_config: flatten_linear
    ft_mup: false
    mup_weights: true
    output_dim: 1
    patch_sampling_rate: 500
    patch_size: 50
  sub_models: {}
  feature_cache: true
task_config:
  data_params:
    data_root: data
    do_drop_bads: true
    electrode_file_path: null
    signal_unit: uV
    target_sr: 500
    use_high_gamma: false
    window_width: 1.0
    subject_ids:
    - 6
    channel_reg_ex: null
    per_subject_electrodes: null
  task_name: volume_level_decoding_task
  task_specific_config:
    allow_resample_audio: true
    audio_path: stimuli/podcast.wav
    audio_sr: 44100
    butter_order: 4
    cutoff_hz: 8.0
    hop_size: 100.0
    target_sr: 512
    window_size: 200.0
    zero_phase: true
training_params:
  batch_size: 4
  early_stopping_metric: corr
  early_stopping_patience: 10
  min_lag: 0
  max_lag: 300
  lag_step_size: 150
  epochs: 100
  learning_rate: 1.0e-05
  loss_weights:
  - 1.0
  losses:
  - mse
  metrics:
  - mse
  - corr
  - r2
  n_folds: 5
  smaller_is_better: false
  weight_decay: 1.0e-05
trial_name: diver_subject6_full_volume_level
