# DIVER Foundation Model - Word Embedding Test Config
#
# Quick test config using arbitrary (random) embeddings.
# Use this to verify the pipeline works before running with real GPT-2 embeddings.
#
# Usage:
#   python main.py --config configs/foundation_models/diver_word_embedding_test.yml

config_setter_name: diver_finetune

task_config:
  task_name: word_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: processed_data/all_subject_sig.csv
    subject_ids:
      - 1
    window_width: 0.5
  task_specific_config:
    # Use arbitrary embeddings for quick testing (no GPT-2 features needed)
    embedding_type: arbitrary
    embedding_pca_dim: 50

training_params:
  batch_size: 32
  epochs: 10  # Fewer epochs for quick test
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  n_folds: 2  # Fewer folds for quick test
  losses:
    - mse
  loss_weights:
    - 1.0
  metrics:
    - cosine_sim
  early_stopping_metric: cosine_sim
  smaller_is_better: false
  min_lag: 0
  max_lag: 0
  lag_step_size: 200

trial_name: diver_word_embedding_test

model_spec:
  constructor_name: diver_finetune
  params:
    foundation_dir: models/diver/pretrained_model/256_mp_rank_00_model_states.pt
    output_dim: 50
    task_name: word_embedding
    d_model: 256
    e_layer: 12
    patch_size: 50
    patch_sampling_rate: 500
    ft_config: flatten_linear
    deepspeed_pth_format: true
    mup_weights: false
    ft_mup: false
    freeze_foundation: false
    data_root: data
  sub_models: {}
