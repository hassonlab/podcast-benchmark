# PopT Foundation Model - Word Embedding Test Config
#
# Quick test config using arbitrary (random) embeddings.
# Use this to verify the pipeline works before running with real GPT-2 embeddings.
#
# Usage:
#   python main.py --config configs/foundation_models/popt_word_embedding_test.yml

config_setter_name: population_transformer_finetune

task_config:
  task_name: word_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: processed_data/all_subject_sig.csv
    subject_ids:
      - 1
  task_specific_config:
    # Use arbitrary embeddings for quick testing (no GPT-2 features needed)
    embedding_type: arbitrary
    embedding_pca_dim: 50

training_params:
  batch_size: 32
  epochs: 10  # Fewer epochs for quick test
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 5
  n_folds: 2  # Fewer folds for quick test
  losses:
    - mse
  loss_weights:
    - 1.0
  metrics:
    - cosine_sim
  early_stopping_metric: cosine_sim
  smaller_is_better: false
  min_lag: 0
  max_lag: 0
  lag_step_size: 200

trial_name: popt_word_embedding_test

model_spec:
  constructor_name: population_transformer_finetune
  params:
    model_dir: models/popt/pretrained_model
    output_dim: 50
    mlp_layer_sizes:
      - 128
    dropout: 0.1
    freeze_foundation: false
    num_frozen_layers: 0
    use_lip_coords: false
  sub_models: {}
