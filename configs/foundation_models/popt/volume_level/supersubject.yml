config_setter_name: popt_finetune
task_config:
  task_name: volume_level_decoding_task
  data_params:
    data_root: data
    electrode_file_path: processed_data/all_subject_sig.csv
    use_high_gamma: false
    target_sr: 2048
    use_lip_coords: true
    window_width: 1.0
  task_specific_config:
    audio_path: stimuli/podcast.wav
    target_sr: 512
    audio_sr: 44100
    cutoff_hz: 8.0
    butter_order: 4
    zero_phase: true
    allow_resample_audio: true
    window_size: 200.0
    hop_size: 25.0
training_params:
  batch_size: 4
  epochs: 100
  learning_rate: 1.0e-05
  weight_decay: 1.0e-05
  early_stopping_patience: 10
  n_folds: 5
  min_lag: -1000
  max_lag: 1500
  lag_step_size: 500
  losses:
  - mse
  loss_weights:
  - 1.0
  metrics:
  - mse
  - corr
  - r2
  early_stopping_metric: r2
  smaller_is_better: false
  fold_ids:
  - 1
  - 5
trial_name: popt_supersubject_volume_level
model_spec:
  constructor_name: popt_finetune
  params:
    model_dir: models/popt/pretrained_model
    brainbert_model_dir: models/brainbert/pretrained_model
    use_lip_coords: true
    use_brainbert: true
    max_coord_value: 5000
    output_dim: 1
    mlp_layer_sizes: []
    dropout: 0.0
    freeze_foundation: true
    num_frozen_layers: 0
  sub_models:
    encoder_model:
      constructor_name: caching_model
      params: {}
      sub_models:
        inner_model:
          constructor_name: popt_encoder
          params: {}
          sub_models: {}
