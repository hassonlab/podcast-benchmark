config_setter_name: popt_finetune
model_spec:
  constructor_name: gpt2_brain
  params:
    freeze_lm: true
  sub_models:
    encoder_model:
      constructor_name: popt_finetune
      params:
        brainbert_model_dir: models/brainbert/pretrained_model
        dropout: 0.0
        freeze_foundation: false
        max_coord_value: 5000
        mlp_layer_sizes: []
        model_dir: models/popt/pretrained_model
        num_frozen_layers: 0
        output_dim: 768
        use_brainbert: true
        use_lip_coords: true
task_config:
  data_params:
    data_root: data
    electrode_file_path: null
    target_sr: 2048
    use_high_gamma: false
    use_lip_coords: true
    window_width: 1.0
    subject_ids:
    - 2
    channel_reg_ex: null
    per_subject_electrodes: null
  task_name: llm_decoding_task
  task_specific_config:
    cache_dir: ./model_cache
    max_context: 32
    max_target_tokens: 16
    model_name: gpt2
    prepend_space: true
    transcript_path: data/stimuli/podcast_transcript.csv
training_params:
  batch_size: 4
  early_stopping_metric: cross_entropy
  early_stopping_patience: 5
  epochs: 100
  lag_step_size: 500
  learning_rate: 1.0e-05
  loss_weights:
  - 1.0
  losses:
  - cross_entropy
  max_lag: 1500
  metrics:
  - acc_llm
  - top_1_acc_llm
  - top_5_acc_llm
  - top_10_acc_llm
  min_lag: -1000
  n_folds: 5
  smaller_is_better: true
  weight_decay: 1.0e-05
  fold_ids:
  - 1
  - 5
trial_name: popt_subject2_full_llm_decoding
