# PopT (Population Transformer) Foundation Model - Word Embedding Decoding Task
# WITH LIP Coordinates (Original PopT Pipeline)
#
# This config finetunes the PopT foundation model on word embedding prediction
# using the full original pipeline: STFT → BrainBERT → PopT with LIP positional encoding.
#
# Prerequisites:
#   1. Download PopT pretrained weights to models/popt/pretrained_model/
#   2. Download BrainBERT pretrained weights to models/brainbert/pretrained_model/
#   3. Ensure LIP coordinates are available for subject electrodes
#   4. Generate checkpoint: cd models/popt/pretrained_model && python generate_checkpoint.py
#
# Usage:
#   python main.py --config configs/foundation_models/popt_word_embedding_with_lip.yml

config_setter_name: population_transformer_finetune

task_config:
  task_name: word_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: processed_data/all_subject_sig.csv
    subject_ids:
      - 1
    # window_width is set automatically by config_setter from pretrained model config
    # STFT preprocessing will be enabled automatically when use_lip_coords=true
  task_specific_config:
    embedding_type: gpt-2xl
    embedding_layer: 24
    embedding_pca_dim: 50

training_params:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  # Loss and metrics for embedding prediction
  losses:
    - mse
  loss_weights:
    - 1.0
  metrics:
    - cosine_sim
  early_stopping_metric: cosine_sim
  smaller_is_better: false
  # Lag sweep (optional - set to single lag for quick testing)
  min_lag: 0
  max_lag: 1
  lag_step_size: 200

trial_name: popt_word_embedding_lip

# Model specification
model_spec:
  # Model data getter for LIP coordinates
  model_data_getter: popt_lip_coords
  constructor_name: population_transformer_finetune
  params:
    # Path to pretrained model directory (contains config.yaml and checkpoint.pth)
    model_dir: models/popt/pretrained_model

    # Output dimension matches embedding_pca_dim
    output_dim: 50

    # MLP decoder head configuration
    mlp_layer_sizes:
      - 256
      - 128

    # Dropout for regularization
    dropout: 0.1

    # Freezing options (0 = train all layers)
    freeze_foundation: false
    num_frozen_layers: 0

    # Enable LIP coordinates for positional encoding (original PopT)
    # This automatically enables BrainBERT and STFT preprocessing
    use_lip_coords: true
    max_coord_value: 5000  # Max LIP coordinate value for PE table

    # BrainBERT model path (optional - uses default if not specified)
    # brainbert_model_dir: models/brainbert/pretrained_model

    # Data root for loading LIP coordinates
    data_root: data

    # Output activation (auto-determined: linear for regression)
    # output_activation: linear
  sub_models: {}
