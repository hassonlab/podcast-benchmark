config_setter_name: brainbert_finetune
model_spec:
  constructor_name: brainbert_finetune
  params:
    dropout: 0.0
    freeze_foundation: false
    mlp_layer_sizes: []
    model_dir: models/brainbert/pretrained_model
    num_frozen_layers: 0
    output_dim: 768
  sub_models: {}
task_config:
  data_params:
    data_root: data
    electrode_file_path: null
    target_sr: 2048
    use_high_gamma: false
    window_width: 1.0
    subject_ids:
    - 7
    channel_reg_ex: null
    per_subject_electrodes: null
  task_name: llm_embedding_pretraining_task
  task_specific_config:
    cache_dir: ./model_cache
    max_context: 32
    max_target_tokens: 16
    model_name: gpt2
    prepend_space: true
    transcript_path: data/stimuli/podcast_transcript.csv
training_params:
  batch_size: 4
  early_stopping_metric: mse
  early_stopping_patience: 10
  epochs: 100
  lag_step_size: 500
  learning_rate: 1.0e-05
  loss_weights:
  - 1.0
  losses:
  - mse
  max_lag: 1500
  metrics:
  - mse
  - corr
  - cosine_sim
  - cosine_dist
  - nll_embedding
  - pairwise_accuracy
  - similarity_entropy
  min_lag: -1000
  n_folds: 5
  normalize_targets: false
  smaller_is_better: true
  weight_decay: 1.0e-05
  fold_ids:
  - 1
  - 5
trial_name: brainbert_subject7_full_llm_embedding_pretraining
