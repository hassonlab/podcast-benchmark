config_setter_name: brainbert_finetune
model_spec:
  constructor_name: brainbert_finetune
  params:
    dropout: 0.0
    freeze_foundation: true
    mlp_layer_sizes: []
    model_dir: models/brainbert/pretrained_model
    output_dim: 1
  sub_models: {}
task_config:
  data_params:
    data_root: data
    electrode_file_path: null
    target_sr: 2048
    use_high_gamma: false
    window_width: 1.0
    subject_ids:
    - 6
    channel_reg_ex: null
    per_subject_electrodes: null
  task_name: iu_boundary_task
  task_specific_config:
    iu_boundaries_csv_path: processed_data/iu_boundaries.csv
    negative_margin_s: 0.5
    negatives_per_positive: 2
training_params:
  batch_size: 4
  early_stopping_metric: f1_logits
  early_stopping_patience: 10
  epochs: 100
  lag_step_size: 500
  learning_rate: 1.0e-05
  loss_weights:
  - 1.0
  losses:
  - bce_with_logits
  max_lag: 1500
  metrics:
  - roc_auc
  - sensitivity_logits
  - specificity_logits
  - f1_logits
  - precision_logits
  - acc_logits
  min_lag: -1000
  n_folds: 5
  smaller_is_better: false
  weight_decay: 1.0e-05
  fold_ids:
  - 1
  - 5
trial_name: brainbert_subject6_full_iu_boundary
