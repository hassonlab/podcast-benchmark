config_setter_name: neural_conv
task_config:
  task_name: llm_decoding_task
  data_params:
    data_root: data
    electrode_file_path: null
    window_width: 0.625
    preprocessing_fn_name: window_average_neural_data
    preprocessor_params:
      num_average_samples: 16
    subject_ids:
    - 1
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
    - 9
    channel_reg_ex: null
    per_subject_electrodes: null
  task_specific_config:
    encoder_forward_kwargs:
      preserve_ensemble: true
training_params:
  batch_size: 16
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 15
  n_folds: 5
  min_lag: -1000
  max_lag: 1250
  lag_step_size: 250
  losses:
  - cross_entropy
  metrics: []
  early_stopping_metric: cross_entropy
  smaller_is_better: true
trial_name: llm_decoding_per_region
model_spec:
  constructor_name: ensemble_pitom_model
  params:
    conv_filters: 128
    dropout: 0.2
    num_models: 10
    embedding_dim: 768
run_mode: per_region
