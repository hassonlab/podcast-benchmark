config_setter_name: neural_conv
task_config:
  task_name: whisper_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: null
    window_width: 0.625
    preprocessing_fn_name: window_average_neural_data
    preprocessor_params:
      num_average_samples: 32
    subject_ids:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
    - 9
    channel_reg_ex: null
    per_subject_electrodes: null
  task_specific_config:
    embedding_pca_dim: 50
training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: -1000
  max_lag: 1250
  lag_step_size: 250
  losses:
  - mse
  metrics:
  - cosine_sim
  - pairwise_accuracy
  early_stopping_metric: cosine_sim
  smaller_is_better: false
trial_name: neural_conv_whisper_embedding_per_region
model_spec:
  constructor_name: ensemble_pitom_model
  params:
    conv_filters: 128
    dropout: 0.2
    num_models: 10
    embedding_dim: 50
  sub_models: {}
run_mode: per_region
