config_setter_name: neural_conv
task_config:
  task_name: gpt_surprise_task
  data_params:
    data_root: data
    electrode_file_path: null
    window_width: 0.625
    preprocessing_fn_name: window_average_neural_data
    preprocessor_params:
      num_average_samples: 32
    subject_ids:
    - 1
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
    - 9
    channel_reg_ex: null
    per_subject_electrodes: null
  task_specific_config:
    content_noncontent_path: processed_data/df_word_onset_with_pos_class.csv
training_params:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 100
  n_folds: 5
  min_lag: -1000
  max_lag: 1250
  lag_step_size: 250
  losses:
  - mse
  metrics:
  - mse
  - corr
  early_stopping_metric: mse
  smaller_is_better: false
  linear_regression_baseline: true
trial_name: gpt_surprise_per_region
model_spec:
  constructor_name: ensemble_pitom_model
  params:
    conv_filters: 128
    dropout: 0.2
    num_models: 10
    embedding_dim: 1
    output_activation: linear
  sub_models: {}
run_mode: per_region
