tasks:
- trial_name: llm_embedding_pretrain_per_subject
  config_setter_name: neural_conv
  task_config:
    task_name: llm_embedding_pretraining_task
    data_params:
      data_root: data
      electrode_file_path: null
      window_width: 0.625
      preprocessing_fn_name: window_average_neural_data
      preprocessor_params:
        num_average_samples: 32
      subject_ids: &id001
      - 1
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      channel_reg_ex: null
      per_subject_electrodes: null
    task_specific_config:
      max_context: 32
      max_target_tokens: 16
      transcript_path: data/stimuli/podcast_transcript.csv
      prepend_space: true
      model_name: gpt2
      cache_dir: ./model_cache
  training_params:
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
    weight_decay: 1.0e-06
    early_stopping_patience: 10
    losses:
    - mse
    metrics:
    - corr
    - nll_embedding
    early_stopping_metric: mse
    smaller_is_better: true
    normalize_targets: false
  model_spec:
    constructor_name: ensemble_pitom_model
    params:
      num_models: 10
      conv_filters: 128
      dropout: 0.2
      embedding_dim: 768
    sub_models: {}
  output_dir: results/llm_two_stage/embedding_pretrain
  checkpoint_dir: checkpoints/llm_two_stage/embedding_pretrain
  tensorboard_dir: event_logs/llm_two_stage/embedding_pretrain
  train_one_subject_at_a_time: true
- trial_name: llm_token_finetune_per_subject
  config_setter_name: neural_conv
  task_config:
    task_name: llm_decoding_task
    data_params:
      data_root: data
      electrode_file_path: null
      window_width: 0.625
      preprocessing_fn_name: window_average_neural_data
      preprocessor_params:
        num_average_samples: 32
      subject_ids: *id001
      channel_reg_ex: null
      per_subject_electrodes: null
    task_specific_config:
      max_context: 32
      max_target_tokens: 16
      transcript_path: data/stimuli/podcast_transcript.csv
      prepend_space: true
      model_name: gpt2
      cache_dir: ./model_cache
  training_params:
    batch_size: 16
    epochs: 50
    learning_rate: 0.0001
    weight_decay: 0.0
    early_stopping_patience: 15
    losses:
    - cross_entropy
    metrics: []
    early_stopping_metric: cross_entropy
    smaller_is_better: true
  model_spec:
    constructor_name: gpt2_brain
    params:
      freeze_lm: true
      encoder_forward_kwargs:
        preserve_ensemble: true
    sub_models:
      encoder_model:
        constructor_name: ensemble_pitom_model
        params:
          num_models: 10
          conv_filters: 128
          dropout: 0.2
          embedding_dim: 768
        checkpoint_path: '{prev_checkpoint_dir}/lag_{lag}/best_model_fold{fold}.pt'
  output_dir: results/llm_two_stage/token_finetune
  checkpoint_dir: checkpoints/llm_two_stage/token_finetune
  tensorboard_dir: event_logs/llm_two_stage/token_finetune
  train_one_subject_at_a_time: true
shared_params:
  training_params.n_folds: 5
  training_params.min_lag: -1000
  training_params.max_lag: 1250
  training_params.lag_step_size: 250
