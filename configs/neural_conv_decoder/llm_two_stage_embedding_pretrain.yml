# Embedding Pre-training Configuration
# Train encoder to predict average token embeddings from GPT-2

task_config:
  task_name: llm_embedding_pretraining_task
  data_params:
    data_root: data
    subject_ids: [9]
    window_width: 0.625
    preprocessing_fn_name: window_average_neural_data
  task_specific_config:
    max_context: 32
    max_target_tokens: 16
    transcript_path: data/stimuli/podcast_transcript.csv
    prepend_space: true
    model_name: gpt2
    cache_dir: ./model_cache
    gpt2_embedding_dim: 768  # gpt2 base model dimension

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: 0
  max_lag: 400
  lag_step_size: 100

  # Loss and metrics for embedding prediction
  losses: [mse]
  metrics: [corr, r2]
  early_stopping_metric: mse
  smaller_is_better: true

  # IMPORTANT: Normalize embeddings for better training stability
  normalize_targets: true

trial_name: llm_embedding_pretrain

model_spec:
  # Train encoder directly (no wrapper model)
  constructor_name: ensemble_pitom_model
  params:
    num_models: 10
    conv_filters: 128
    dropout: 0.2
    # output_dim will be set by config_setter to 768
  sub_models: {}

output_dir: results/llm_two_stage/embedding_pretrain
checkpoint_dir: checkpoints/llm_two_stage/embedding_pretrain
tensorboard_dir: event_logs/llm_two_stage/embedding_pretrain
