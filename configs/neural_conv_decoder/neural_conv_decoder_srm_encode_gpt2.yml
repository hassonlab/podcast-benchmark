# Decode directly from SRM shared space (k=8 dims) — no reconstruction back to electrodes
# 1. Train SRM: python shared_space/scripts/train_srm.py --config shared_space/configs/podcast_srm.yml
# 2. Eval:      python main.py --config configs/neural_conv_decoder/neural_conv_decoder_srm_encode_gpt2.yml

config_setter_name: neural_conv_srm_encode

task_config:
  task_name: word_embedding_decoding_task
  data_params:
    data_root: data
    word_column: word
    electrode_file_path: processed_data/all_subject_sig.csv
    window_width: 0.625
    preprocessing_fn_name:
      - window_average_neural_data
      - srm_encode
    preprocessor_params:
      - num_average_samples: 32
      - srm_checkpoint_path: shared_space/checkpoints/srm_podcast.pkl
  task_specific_config:
    embedding_type: gpt-2xl
    embedding_layer: 24
    embedding_pca_dim: 50

model_spec:
  constructor_name: ensemble_pitom_model
  params:
    conv_filters: 128
    dropout: 0.2
    num_models: 10
    embedding_dim: 50
  sub_models: {}

training_params:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  n_folds: 5
  min_lag: 200
  max_lag: 201
  lag_step_size: 700
  metrics:
    - nll_embedding
    - cosine_sim
    - pairwise_accuracy

trial_name: ensemble_model_10_gpt2_srm_encode
